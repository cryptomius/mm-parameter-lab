# Experiment manifest. Each entry is one logical experiment; sweeps (gamma_sweep,
# multiple seeds) are expanded by runner.manifest.expand into concrete runs.

# --- Baseline ----------------------------------------------------------------
- id: baseline_calm
  finding: 0
  description: Baseline AS quoter on calm GBM, no events, no interventions.
  seeds: [42]
  duration_seconds: 14400
  market:
    process: gbm
    sigma_true: 0.001
    drift: 0.0
    initial_price: 100.0
  counterparties:
    noise:
      count: 16
      arrival_rate_hz: 5.0
      limit_fraction: 0.7
      cancel_halflife_s: 30.0
    informed:
      count: 0
  quoter:
    type: avellaneda_stoikov
    gamma: 0.1
    k: 10.0
    tau: 300
    quote_size: 1.0
    refresh_ms: 100
    inventory_limit: 100
    spread_caps: { min: 0.0001, max: 0.05 }
    sigma_estimator:
      type: ewma
      halflife_s: 60
  events: []
  output_path: results/baseline_calm

